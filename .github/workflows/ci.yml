name: CI

on:
  push:
    branches: [main]
  pull_request:

# CEMP Mobile (CellSend) — the gates that must stay green before mainnet
# consideration (AGENTS.md rule 12). Mirrors the local gate sequence exactly.

jobs:
  typescript:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # No `version:` input — the pnpm version comes from the `packageManager`
      # pin in package.json, so there is one source of truth (and newer
      # action-setup releases reject specifying it twice).
      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Compilation is the type check (strict; cross-package imports resolve
      # against dist, so build precedes tests).
      - run: pnpm build

      - run: pnpm test

      - run: pnpm lint

      - name: Prettier check (no writes on CI)
        run: pnpm exec prettier --check .

      - name: Dependency audit (high severity and above)
        run: pnpm audit --prod --audit-level=high

  contracts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: RISC-V C cross-compiler (ckb-std C sources)
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-riscv64-unknown-elf

      - uses: dtolnay/rust-toolchain@stable
        with:
          # Must match contracts/rust-toolchain.toml — the deployment codeHash
          # is only reproducible under the toolchain it was built with.
          toolchain: "1.92.0"
          targets: riscv64imac-unknown-none-elf

      - name: Contract tests
        run: cargo test --locked
        working-directory: contracts

      - name: Reproducible-build check (byte-identical codeHash, twice)
        run: contracts/cemp-message-type/verify-reproducible.sh

      - name: ML-DSA signing-harness interop vectors
        run: |
          cargo run --locked --manifest-path tools/signing-harness/Cargo.toml -- vectors --out /tmp/mldsa-v2.json
          diff -u packages/cemp-test-vectors/vectors/mldsa-v2.json /tmp/mldsa-v2.json
